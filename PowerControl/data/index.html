<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>POWER CONTROL</title>

    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #111;
            font-family: Arial;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .right {
            width: 350px;
            background: #000;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 32px;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        .power-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: radial-gradient(circle at top, #444, #111);
            color: white;
            font-size: 30px;
            font-weight: bold;
        }

        .power-btn:active {
            transform: scale(0.92);
            background: radial-gradient(circle at top, #ff4444, #770000);
        }

        .status {
            margin-top: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: red;
            box-shadow: 0 0 15px red;
        }

        .log-header {
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-header button {
            background: red;
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .log-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            color: #0f0;
        }

        .log-line {
            margin-bottom: 4px;
            border-bottom: 1px dashed #222;
            padding-bottom: 2px;
        }

        @media screen and (max-width: 768px) {

            body {
                flex-direction: column;
                overflow: hidden;
            }

            .left {
                height: 60vh;
            }

            .right {
                width: 100%;
                height: 40vh;
                border-left: none;
                border-top: 1px solid #333;
            }

            .title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .power-btn {
                width: 140px;
                height: 140px;
                font-size: 26px;
            }

            .status {
                font-size: 22px;
                margin-top: 20px;
            }
        }
    </style>

</head>

<body>

    <div class="left">

        <div class="title">POWER CONTROL</div>

        <button class="power-btn" onmousedown="pressButton()" onmouseup="releaseButton()" ontouchstart="pressButton()"
            ontouchend="releaseButton()">

            POWER
        </button>

        <div class="status">
            <div class="dot" id="dot"></div>
            <div id="status">OFF</div>
        </div>

    </div>

    <div class="right">

        <div class="log-header">
            <div>LOG SYSTEM</div>
            <button onclick="clearLog()">CLEAR</button>
        </div>

        <div id="log" class="log-box"></div>

    </div>

    <script>

        let ws;

        // ================= BASE CONFIG =================
        const IS_HTTPS = location.protocol === "https:";

        const BASE_URL = IS_HTTPS
            ? location.origin
            : "http://" + location.hostname + ":80";

        const WS_URL = IS_HTTPS
            ? "wss://" + location.host + "/ws"
            : "ws://" + location.hostname + ":81/";

        // ================= LOG =================
        function addLog(text) {
            const box = document.getElementById("log");
            box.innerHTML += `<div class="log-line">${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // ================= LOAD HISTORY =================
        function loadLog() {

            fetch(BASE_URL + '/log')
                .then(r => r.text())
                .then(t => {

                    const box = document.getElementById("log");
                    box.innerHTML = "";

                    t.split("\n").forEach(l => {
                        if (l.trim() !== "") {
                            box.innerHTML += `<div class="log-line">${l}</div>`;
                        }
                    });

                    box.scrollTop = box.scrollHeight;
                });
        }

        // ================= WS =================
        function connectWS() {

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                addLog("WEBSOCKET CONNECTED");
            };

            ws.onmessage = (event) => {

                let data = JSON.parse(event.data);

                if (data.status) {

                    document.getElementById("status").innerText = data.status;

                    let dot = document.getElementById("dot");

                    if (data.status === "ON") {
                        dot.style.background = "lime";
                        dot.style.boxShadow = "0 0 15px lime";
                    } else {
                        dot.style.background = "red";
                        dot.style.boxShadow = "0 0 15px red";
                    }
                }

                if (data.log) {
                    addLog(data.log);
                }

                if (data.clear) {
                    document.getElementById("log").innerHTML = "";
                }
            };

            ws.onclose = () => {
                addLog("WEBSOCKET DISCONNECTED");
                setTimeout(connectWS, 2000);
            };

            ws.onerror = () => {
                addLog("WEBSOCKET ERROR");
            };
        }

        // ================= BUTTON =================
        function pressButton() {
            fetch(BASE_URL + '/press');
        }

        function releaseButton() {
            fetch(BASE_URL + '/release');
        }

        function clearLog() {
            fetch(BASE_URL + '/clearlog', { method: 'POST' })
                .then(() => {
                    document.getElementById("log").innerHTML = "";
                });
        }

        // ================= INIT =================
        loadLog();
        connectWS();

    </script>

</body>

</html>
